name: Publish to PyPI

# Publishes the current pyproject.toml version to PyPI via OIDC trusted
# publishing on every push to main. Idempotent — `skip-existing: true`
# makes re-runs against an already-uploaded version a no-op, so
# docs-only / no-version-bump PRs harmlessly trigger this workflow.
#
# REQUIRES a one-time PyPI trusted-publisher registration for the `krepis`
# project (repo: nousergon/krepis, workflow: publish.yml, environment:
# pypi). Until that exists the publish job fails by design — see the repo
# README / handoff notes. workflow_dispatch is kept for manual recovery.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify artifacts with twine check
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # OIDC trusted-publishing requires id-token: write at the job level.
    # No PYPI_API_TOKEN secret is used — PyPI verifies the workflow
    # identity (project + repo + workflow filename + environment).
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/krepis/
    steps:
      # checkout MUST run before the artifact download below: actions/checkout
      # defaults to `clean: true` (`git clean -ffdx`), which deletes any
      # untracked files already in the workspace — including a dist/ directory
      # populated by an earlier download-artifact step. Live-reproduced
      # 2026-07-14 (krepis 0.12.2 release): the publish itself succeeded
      # (PyPI confirmed byte-identical by hand), but this job's own verify
      # step always failed with "dist/*.tar.gz: No such file or directory"
      # because checkout ran AFTER download-artifact and silently wiped it —
      # a false-negative on every single publish since this guard was added.
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # Read BEFORE the publish step below, so the result reflects
      # pre-publish PyPI state — used to gate the verify step further down.
      # Without this gate the verify step always compares a fresh rebuild
      # of CURRENT main against a historical, version-pinned PyPI artifact
      # and is GUARANTEED to "diverge" on every push that changes any file
      # without also bumping pyproject.toml's version (docs, CI, unrelated
      # refactors) — main's tree keeps moving, the published bytes for an
      # already-released version never do (PyPI is immutable per version).
      # That's not a real divergence, just two different points in time —
      # live-reproduced 2026-07-14 immediately after fixing the OTHER bug
      # in this file (checkout/download-artifact ordering) let this step
      # finally run its actual logic for the first time, which then
      # false-positive-failed on the very next unrelated push (krepis#23's
      # own merge, no version bump) for exactly this reason.
      - name: Check whether this version is already on PyPI
        id: precheck
        run: |
          set -euo pipefail
          version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if curl -sf "https://pypi.org/pypi/krepis/${version}/json" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "krepis ${version} is already on PyPI — this run's publish step will no-op (skip-existing); nothing new to verify."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "krepis ${version} is not yet on PyPI — this run will publish it fresh."
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Verify published sdist is byte-identical to this build
        # Defense-in-depth: version-bump-check.yml blocks PR merges that
        # would create a byte-divergent PyPI release, but it can't catch a
        # direct push to main (bypassing PR review) or an out-of-band manual
        # upload racing this workflow. `skip-existing: true` above silently
        # no-ops if PyPI already has this version — verify after the fact
        # that what's live on PyPI actually matches what we just built,
        # rather than trusting the no-op was a true no-op.
        # See alpha-engine-config#1424.
        #
        # Only meaningful when THIS run actually published a NEW version
        # (precheck.outputs.exists == 'false') — see the precheck step's
        # comment above for why running this unconditionally always
        # false-positive-fails on any no-version-bump push.
        if: steps.precheck.outputs.exists != 'true'
        run: |
          set -euo pipefail
          version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          local_sha=$(sha256sum dist/*.tar.gz | awk '{print $1}')

          pypi_json=""
          for _ in 1 2 3 4 5 6; do
            if pypi_json=$(curl -sf "https://pypi.org/pypi/krepis/${version}/json"); then
              break
            fi
            sleep 10
          done
          if [ -z "${pypi_json}" ]; then
            echo "::error::Could not reach PyPI JSON API for krepis ${version} after publish — cannot verify byte-identity."
            exit 1
          fi

          published_sha=$(echo "${pypi_json}" | python -c "import sys, json; data = json.load(sys.stdin); sdists = [u for u in data.get('urls', []) if u.get('packagetype') == 'sdist']; print(sdists[0]['digests']['sha256'] if sdists else '')")
          if [ "${local_sha}" != "${published_sha}" ]; then
            echo "::error::Published PyPI sdist for krepis ${version} does NOT match this build's bytes (local=${local_sha} pypi=${published_sha}). skip-existing silently kept an OLDER artifact live — main and PyPI have diverged for v${version}. See alpha-engine-config#1424."
            exit 1
          fi
          echo "OK: PyPI v${version} sdist sha256 matches this build (${local_sha})."
