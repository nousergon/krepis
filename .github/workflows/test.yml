name: Tests

# pytest matrix across declared Python versions. Required check on PRs to
# main so a change can't ship before being validated against the floor of
# declared support (3.9 — the EC2 always-on micro instance).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    # Self-hosted ephemeral EC2-spot runner (krepis-runner-dispatcher Lambda,
    # nousergon-data infrastructure/lambdas/krepis-runner-dispatcher) —
    # multi-version Python tool-cache fix verified live on telos (7 rounds
    # of real bugs found+fixed, see reference_uv_python_self_hosted_runner_fix_sequence_260717).
    runs-on: [self-hosted, krepis-spot]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest -q --cov=krepis --cov-report=term-missing --cov-fail-under=90

  # Alert (Telegram) ONLY on genuine post-merge breakage of the default
  # branch. PR-branch reds stay silent. Reusable workflow + transport
  # live in nousergon-lib. See alpha-engine-config#1128.
  notify-main-failure:
    needs: [test]
    if: ${{ failure() && github.ref == 'refs/heads/main' }}
    uses: nousergon/nousergon-lib/.github/workflows/notify-ci-failure.yml@main
    secrets: inherit
