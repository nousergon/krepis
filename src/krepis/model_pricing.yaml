# LLM cost rate card — default pricing shipped with alpha_engine_lib.
#
# Loaded by ``alpha_engine_lib.cost.load_default_pricing``. Consumers that
# need their own operator-managed rate card (e.g. alpha-engine-research)
# should keep using ``load_pricing(path)`` with an external YAML; this
# file is the sensible default for new consumers (morning-signal and
# anything else outside the alpha-engine repos) so they don't have to
# author a pricing table just to wire cost telemetry.
#
# Schema (per card):
#   model_name:           Anthropic model identifier (matches ModelMetadata.model_name).
#   effective_from:       ISO date when this rate became active (inclusive).
#   input_per_1m:         USD per 1,000,000 input tokens.
#   output_per_1m:        USD per 1,000,000 output tokens.
#   cache_read_per_1m:    USD per 1,000,000 cached-prompt-read tokens (0.10× input).
#   cache_create_per_1m:  USD per 1,000,000 5-MIN-TTL cache-write tokens (1.25× input).
#   cache_create_1h_per_1m: USD per 1,000,000 1-HOUR-TTL cache-write tokens (2.0× input).
#                         Optional — when omitted, 1-hour cache writes fall back to
#                         ``cache_create_per_1m`` (the 5-min rate). The Anthropic SDK
#                         splits cache-write tokens by TTL on
#                         ``usage.cache_creation`` (ephemeral_5m / ephemeral_1h), and
#                         the cost pipeline prices each slice at its own rate.
#
# **Cards for the same model MUST be sorted ascending by effective_from.**
# When pricing changes, append a new card with the new effective_from rather
# than editing an existing one — historical artifacts remain repriceable
# against the rate that was active at their capture time.
#
# Sources:
#   https://platform.claude.com/docs/en/about-claude/pricing  (verify periodically)
#
# version: 1
cards:
  - model_name: claude-haiku-4-5
    effective_from: 2026-01-01
    input_per_1m: 1.00
    output_per_1m: 5.00
    cache_read_per_1m: 0.10
    cache_create_per_1m: 1.25
    cache_create_1h_per_1m: 2.00
  - model_name: claude-sonnet-4-6
    effective_from: 2026-01-01
    input_per_1m: 3.00
    output_per_1m: 15.00
    cache_read_per_1m: 0.30
    cache_create_per_1m: 3.75
    cache_create_1h_per_1m: 6.00
  - model_name: claude-opus-4-7
    effective_from: 2026-01-01
    input_per_1m: 5.00
    output_per_1m: 25.00
    cache_read_per_1m: 0.50
    cache_create_per_1m: 6.25
    cache_create_1h_per_1m: 10.00

  # ── Open-weight models served via OpenRouter ──────────────────────────
  # Prices are OpenRouter LIST rates (verified against the live models API
  # 2026-07-03) and function as CEILINGS: with `:floor` variant routing the
  # actually-billed backend price is usually lower, and the canonical cost
  # source is the provider-reported `usage.cost` captured by
  # `record_llm_call` (cost_source: provider_reported). These cards are the
  # repricing fallback when a response carried no reported cost.
  #
  # Cache rates: the OpenAI-compatible wire format has no cache-WRITE token
  # class (cache_create never populated), and cache-READ discounts vary by
  # routed backend — priced here at the full input rate so the fallback
  # never UNDERSTATES spend.
  - model_name: moonshotai/kimi-k2.6
    effective_from: 2026-07-03
    input_per_1m: 0.66
    output_per_1m: 3.41
    cache_read_per_1m: 0.66
    cache_create_per_1m: 0.66
  - model_name: deepseek/deepseek-v4-flash
    effective_from: 2026-07-03
    input_per_1m: 0.09
    output_per_1m: 0.18
    cache_read_per_1m: 0.09
    cache_create_per_1m: 0.09
  - model_name: deepseek/deepseek-v4-pro
    effective_from: 2026-07-03
    input_per_1m: 0.435
    output_per_1m: 0.87
    cache_read_per_1m: 0.435
    cache_create_per_1m: 0.435
  - model_name: openai/gpt-oss-120b
    effective_from: 2026-07-03
    input_per_1m: 0.03
    output_per_1m: 0.15
    cache_read_per_1m: 0.03
    cache_create_per_1m: 0.03
  - model_name: qwen/qwen3.7-plus
    effective_from: 2026-07-03
    input_per_1m: 0.32
    output_per_1m: 1.28
    cache_read_per_1m: 0.32
    cache_create_per_1m: 0.32

# Server-side tool fees (Anthropic ``Message.usage.server_tool_use``).
# Billed as flat per-request fees, independent of which model invoked
# the tool. Rates published by Anthropic as USD per 1,000 requests.
#
# Schema (per fee):
#   tool_name:              Server-tool identifier (matches the field name
#                           in ``anthropic.types.ServerToolUsage``).
#   effective_from:         ISO date when this rate became active.
#   per_1k_requests_usd:    USD per 1,000 requests.
#
# **Fees for the same tool MUST be sorted ascending by effective_from.**
#
# web_fetch is currently free per Anthropic's pricing page (no separate
# per-request fee) — kept in the table at 0.00 so request counts still
# flow through the pricing pipeline; bump the rate here if/when Anthropic
# introduces a fee.
tool_fees:
  - tool_name: web_search
    effective_from: 2026-01-01
    per_1k_requests_usd: 10.00
  - tool_name: web_fetch
    effective_from: 2026-01-01
    per_1k_requests_usd: 0.00
  # OpenRouter `openrouter:web_search` server tool (any model). Base rate
  # $0.005/request = $5/1k (Exa/Parallel engines, verified 2026-07-03);
  # the additional $0.001/result beyond 10 results per request is NOT
  # modeled — the provider-reported `usage.cost` is the canonical number,
  # this fee is the repricing fallback. Provider-scoped name per
  # `_tool_request_counts` (Anthropic's bare `web_search` bills at $10/1k).
  - tool_name: "openrouter:web_search"
    effective_from: 2026-07-03
    per_1k_requests_usd: 5.00
